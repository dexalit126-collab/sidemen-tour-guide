<style>
body {

    background: linear-gradient(135deg, #2c5364, #203a43, #0f2027);
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    color: #333;

.container {
    text-align: center;

    width: 95%;
    max-width: 600px;
    box-shadow: 0 20px 40px rgba(0,0,0,0.25);

h2 {

    color: #1e3c72;

p {

    font-size: 14px;
    line-height: 1.6;

.details strong {
    color: #1e3c72;

.button {
    display: inline-block;
    margin-top: 20px;
    padding: 12px 25px;
    border-radius: 30px;
    text-decoration: none;
    font-weight: 500;
    transition: 0.3s;

.wa-btn {
    background: #25D366;

.home-btn {
